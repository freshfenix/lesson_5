<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../styles/style.css">
  <title>Gallery</title>
</head>

<body>
  <div class="wrapper">
    <header class="header">
      <div class="container">
        <div class="header__wrapper">
          <button class="header__burger" type="button" aria-label="Open menu">

            <span></span>
            <span></span>
            <span></span>
          </button>
          <nav class="header-nav">

            <ul class="header-nav-list">

              <li>
                <a class="header-nav-item" href="articles.html">

                  <span>статті</span>
                </a>
              </li>

              <li>
                <a class="header-nav-item" href="catalog.html">

                  <span>каталог</span>
                </a>
              </li>

              <li>
                <a class="header-nav-item" href="contacts.html">

                  <span>контакти</span>
                </a>
              </li>

              <li>
                <a class="header-nav-item header-nav-item--active" href="gallery.html">

                  <span>галерея</span>
                </a>
              </li>

              <li>
                <a class="header-nav-item" href="page-nav.html">

                  <span>навігація</span>
                </a>
              </li>

              <li>
                <a class="header-nav-item" href="registration.html">

                  <span>реєстрація</span>
                </a>
              </li>

            </ul>

          </nav>
        </div>
      </div>
    </header>
    <main>
      <div class="container">
        <ul class="gallery-list">
          <li class="gallery-list-item">
            <a href="../images/animal.svg" target="_blank">
              <img class="gallery-list-img" src="../images/animal.svg" alt="animal svg">
            </a>
            <h2 class="gallery-list-title"><a class="gallery-list-link" href="../images/animal.svg"
                target="_blank">Svg</a></h2>
          </li>
          <li class="gallery-list-item">
            <a href="../images/animals.jpg" target="_blank"><img class="gallery-list-img" src="../images/animals.jpg"
                alt="animals"></a>
            <h2 class="gallery-list-title"><a href="../images/animals.jpg" target="_blank">jpg</a></h2>
          </li>
          <li class="gallery-list-item"><a class="gallery-list-link" href="../images/kitten.webp"><img
                class="gallery-list-img" src="../images/kitten.webp" alt="kitten"></a>
            <h2 class="gallery-list-title"><a class="gallery-list-link" href="../images/kitten.webp"
                target="_blank">webp</a></h2>
          </li>
        </ul>
      </div>
    </main>
    <footer>
      <div class="container footer">
        <p>&copy; FreshFenix</p>
        <a href="../index.html">Повернутись на головну</a>
      </div>
    </footer>
  </div>
  <script>
    const burger = document.querySelector('.header__burger');
    const header = document.querySelector('.header');

    burger.addEventListener('click', () => {
      header.classList.toggle('header--open');
    });
  </script>
</body>

</html>
