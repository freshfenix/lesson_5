<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../styles/style.css">
  <title>Contacts</title>
</head>

<body>
  <div class="wrapper">
    <header class="header">
      <div class="container">
        <div class="header__wrapper">
          <button class="header__burger" type="button" aria-label="Open menu">

            <span></span>
            <span></span>
            <span></span>
          </button>
          <nav class="header-nav">

            <ul class="header-nav-list">

              <li>
                <a class="header-nav-item" href="articles.html">

                  <span>статті</span>
                </a>
              </li>

              <li>
                <a class="header-nav-item" href="catalog.html">

                  <span>каталог</span>
                </a>
              </li>

              <li>
                <a class="header-nav-item header-nav-item--active" href="contacts.html">

                  <span>контакти</span>
                </a>
              </li>

              <li>
                <a class="header-nav-item" href="gallery.html">

                  <span>галерея</span>
                </a>
              </li>

              <li>
                <a class="header-nav-item" href="page-nav.html">

                  <span>навігація</span>
                </a>
              </li>

              <li>
                <a class="header-nav-item" href="registration.html">

                  <span>реєстрація</span>
                </a>
              </li>

            </ul>

          </nav>
        </div>
      </div>
    </header>
    <main>
      <section class="contacts">
        <div class="container contacts-wrapper">
          <div class="contacts-box">
            <p class="contacts-text">вулиця Канатна, 22, Одеса, Одеська область, 65000</p>
            <h2>Як дістатися</h2>
            <iframe class="contacts-map"
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2747.4426967800073!2d30.745379276771455!3d46.47954586512303!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x40c6319f49eaaaab%3A0xa6467105eed9b98c!2sHillel%20IT%20School!5e0!3m2!1suk!2sua!4v1776628996227!5m2!1suk!2sua"
              width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>
          </div>
          <form class="contacts-form" action="https://tests.fomenko.top/echo/index.php" method="get">
            <h2 class="contacts-form-title">Зворотній зв'язок</h2>
            <div>
              <label for="name">Ім'я:</label>
              <input class="name" type="text" id="name" name="name" required>
            </div>

            <div>
              <label for="phone">Телефон:</label>
              <input type="tel" id="phone" name="phone" placeholder="+380..." required>
            </div>

            <div>
              <label for="email">Email:</label>
              <input type="email" id="email" name="email" required>
            </div>

            <div>
              <label for="message">Ваше питання:</label>
              <textarea class="capitalize" id="message" name="message" rows="5" cols="40" required></textarea>
            </div>

            <div class="form-button-box">
              <button class="contacts-form-button" type="submit">Очистити</button>
              <button class="contacts-form-button" type="reset">Надіслати</button>
            </div>


          </form>
        </div>
      </section>
    </main>
    <footer>
      <div class="container footer">
        <p>&copy; FreshFenix</p>
        <a href="../index.html">Повернутись на головну</a>
      </div>
    </footer>
  </div>
  <script>
    const burger = document.querySelector('.header__burger');
    const header = document.querySelector('.header');

    burger.addEventListener('click', () => {
      header.classList.toggle('header--open');
    });
  </script>
</body>

</html>
